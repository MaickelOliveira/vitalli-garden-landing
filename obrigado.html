<style>
:root {
  --verde-escuro:  #1E4D2B;
  --verde:         #2D6A4F;
  --verde-medio:   #40916C;
  --dourado:       #C8A84B;
  --dourado-claro: #E8C87A;
  --creme:         #F9F5EC;
  --branco:        #FFFFFF;
  --texto-escuro:  #1A2B1F;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, var(--verde-escuro), var(--verde));
  color: var(--texto-escuro);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
.card {
  background: var(--creme);
  border-radius: 24px;
  padding: 3rem 2.5rem;
  max-width: 440px;
  width: 100%;
  text-align: center;
  box-shadow: 0 25px 70px rgba(0,0,0,.35);
  animation: cardIn .4s ease;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.check {
  width: 72px; height: 72px;
  margin: 0 auto 1.3rem;
  border-radius: 50%;
  background: var(--verde);
  color: #fff;
  font-size: 2.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
h1 { font-family: 'Playfair Display', serif; color: var(--verde-escuro); font-size: 1.6rem; margin-bottom: .6rem; }
p { color: var(--texto-escuro); opacity: .8; font-size: .98rem; line-height: 1.5; }
#count { font-weight: 700; color: var(--verde); }
.btn-fallback {
  display: none;
  margin-top: 1.5rem;
  padding: .8rem 1.8rem;
  border-radius: 50px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  font-size: .9rem;
  align-items: center;
  justify-content: center;
}
.voltar { display: block; margin-top: 1rem; font-size: .85rem; color: var(--verde-medio); }
</style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->

<div class="card">
  <div class="check">✓</div>
  <h1>Obrigado pelo contato!</h1>
  <p>Você será redirecionado para o WhatsApp em <span id="count">3</span> segundos...</p>
  <a id="fallback" class="btn-fallback" href="https://wa.me/5544997172284">Ir para o WhatsApp agora</a>
  <a class="voltar" href="index.html">Voltar ao site</a>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var target = params.get("wa") || "https://wa.me/5544997172284";
  var countEl = document.getElementById("count");
  var fallback = document.getElementById("fallback");
  fallback.href = target;

  var seconds = 3;
  var timer = setInterval(function () {
    seconds -= 1;
    countEl.textContent = Math.max(seconds, 0);
    if (seconds <= 0) clearInterval(timer);
  }, 1000);

  setTimeout(function () {
    window.location.href = target;
  }, 3000);

  // Mostra o botão manual caso o navegador bloqueie o redirecionamento automático
  setTimeout(function () { fallback.style.display = "inline-flex"; }, 4000);
})();
</script>
</body>
